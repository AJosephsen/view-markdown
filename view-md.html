<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; color: #111; background: #fff; }

    #topbar {
      display: flex; align-items: center; gap: 8px;
      padding: 3px 8px; border-bottom: 1px solid #e8e8e8;
      background: #fafafa; position: sticky; top: 0; z-index: 10;
      transition: padding 0.15s;
      min-height: 32px;
    }
    /* Collapsed: hide everything except the toggle button */
    #topbar.collapsed .nav-btn:not(#btnToggle),
    #topbar.collapsed a.nav-btn,
    #topbar.collapsed .nav-sep,
    #topbar.collapsed #filePath,
    #topbar.collapsed #status {
      display: none;
    }
    #topbar.collapsed {
      padding: 2px 6px;
      background: transparent;
      border-bottom-color: transparent;
    }
    #btnToggle { margin-left: auto; font-size: 12px; opacity: 0.5; }
    #btnToggle:hover { opacity: 1; }
    .nav-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border: 1px solid #ddd; border-radius: 6px;
      background: #fff; cursor: pointer; font-size: 15px; color: #444;
      text-decoration: none; user-select: none; flex-shrink: 0;
      transition: background 0.1s, color 0.1s;
    }
    .nav-btn:hover:not([disabled]) { background: #f0f0f0; color: #111; }
    .nav-btn[disabled] { opacity: 0.35; cursor: default; pointer-events: none; }
    .nav-sep { width: 1px; height: 20px; background: #ddd; margin: 0 2px; flex-shrink: 0; }
    #filePath {
      font-size: 13px; color: #666; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
    }
    #status { font-size: 13px; color: #888; margin-left: auto; white-space: nowrap; }

    #content {
      max-width: 860px; margin: 0 auto; padding: 28px 24px 60px;
      font-size: 15px; line-height: 1.6;
    }

    /* Markdown styling */
    #content h1 { font-size: 1.9em; border-bottom: 1px solid #eee; padding-bottom: 8px; margin: 0 0 16px; }
    #content h2 { font-size: 1.4em; border-bottom: 1px solid #eee; padding-bottom: 6px; margin: 28px 0 12px; }
    #content h3 { font-size: 1.15em; margin: 22px 0 8px; }
    #content h4, #content h5, #content h6 { margin: 18px 0 6px; }
    #content p { margin: 0 0 14px; }
    #content ul, #content ol { padding-left: 24px; margin: 0 0 14px; }
    #content li { margin-bottom: 4px; }
    #content code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: #f5f5f5; padding: 2px 5px; border-radius: 4px; font-size: 0.88em;
    }
    #content pre {
      background: #f7f7f7; border: 1px solid #e8e8e8; border-radius: 8px;
      padding: 14px 16px; overflow-x: auto; margin: 0 0 16px;
    }
    #content pre code { background: none; padding: 0; font-size: 0.87em; }
    #content blockquote {
      border-left: 4px solid #d0d7de; margin: 0 0 14px; padding: 4px 16px; color: #555;
    }
    #content table { border-collapse: collapse; width: 100%; margin: 0 0 16px; font-size: 14px; }
    #content th, #content td { border: 1px solid #d0d7de; padding: 6px 12px; }
    #content th { background: #f6f8fa; font-weight: 600; }
    #content tr:nth-child(even) { background: #f6f8fa; }
    #content a { color: #0969da; }
    #content a:hover { text-decoration: none; }
    #content hr { border: none; border-top: 1px solid #eee; margin: 24px 0; }
    #content img { max-width: 100%; border-radius: 4px; }

    #error {
      display: none; margin: 40px auto; max-width: 600px; padding: 20px 24px;
      background: #fff8f8; border: 1px solid #fca5a5; border-radius: 8px; color: #991b1b;
    }
    #error code { background: #fee2e2; }
  </style>
</head>
<body>

  <div id="topbar" class="collapsed">
    <button class="nav-btn" id="btnBack"    title="Back">&#8592;</button>
    <button class="nav-btn" id="btnForward" title="Forward">&#8594;</button>
    <button class="nav-btn" id="btnReload"  title="Reload">&#8635;</button>
    <a class="nav-btn"  href="view-md.html" title="Home (index.md)">&#8962;</a>
    <div class="nav-sep"></div>
    <span id="filePath">—</span>
    <span id="status">Loading…</span>
    <button class="nav-btn" id="btnToggle" title="Expand/collapse toolbar">☰</button>
  </div>

  <div id="error">
    <strong>Could not load file</strong><br>
    <span id="errorDetail"></span>
  </div>

  <div id="content"></div>

  <script src="./libs/marked.umd.js"></script>
  <script src="./libs/mermaid.min.js"></script>
  <script>
    const content     = document.getElementById('content');
    const filePath    = document.getElementById('filePath');
    const status      = document.getElementById('status');
    const errorBox    = document.getElementById('error');
    const errorDetail = document.getElementById('errorDetail');
    const btnBack     = document.getElementById('btnBack');
    const btnForward  = document.getElementById('btnForward');
    const topbar      = document.getElementById('topbar');
    const btnToggle   = document.getElementById('btnToggle');
    const btnReload   = document.getElementById('btnReload');
    btnReload.addEventListener('click', () => location.reload());

    // Topbar collapse/expand — persisted in localStorage
    (function initTopbar() {
      const collapsed = localStorage.getItem('mdTopbarCollapsed') !== 'false';
      topbar.classList.toggle('collapsed', collapsed);
    })();

    btnToggle.addEventListener('click', () => {
      const isCollapsed = topbar.classList.toggle('collapsed');
      localStorage.setItem('mdTopbarCollapsed', isCollapsed);
    });

    function updateNavButtons() {
      // history.length only tells us total entries, not position.
      // We track position ourselves via sessionStorage.
      const pos = parseInt(sessionStorage.getItem('mdNavPos') || '0', 10);
      const len = parseInt(sessionStorage.getItem('mdNavLen') || '1', 10);
      btnBack.disabled    = pos <= 0;
      btnForward.disabled = pos >= len - 1;
    }

    btnBack.addEventListener('click', () => history.back());
    btnForward.addEventListener('click', () => history.forward());

    // Track navigation position so we can en/disable the buttons.
    window.addEventListener('pageshow', updateNavButtons);

    // Given a link href found inside a markdown file at currentFilePath (relative to
    // this page), resolve it to a path also relative to this page.
    function resolveRelative(href, currentFilePath) {
      try {
        const pageDir = window.location.href.split('?')[0].replace(/[^/]+$/, '');
        const fileUrl = new URL(currentFilePath, pageDir);
        const fileDir = fileUrl.href.replace(/[^/]+$/, '');
        const resolved = new URL(href, fileDir);
        // Build relative path from pageDir back to resolved
        const pageParts  = new URL(pageDir).pathname.replace(/\/$/, '').split('/').filter(Boolean);
        const resParts   = resolved.pathname.split('/').filter(Boolean);
        let i = 0;
        while (i < pageParts.length && i < resParts.length && pageParts[i] === resParts[i]) i++;
        const ups  = pageParts.length - i;
        const down = resParts.slice(i).join('/');
        return (ups > 0 ? '../'.repeat(ups) : './') + down;
      } catch (e) {
        return href; // leave unchanged on error
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function isStandaloneMermaid(path) {
      const clean = String(path || '').split('#')[0].split('?')[0];
      return /\.(mmd|mermaid)$/i.test(clean);
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = () => reject(new Error(`Failed to load ${src}`));
        document.head.appendChild(s);
      });
    }

    let mermaidLoadPromise = null;
    let mermaidInitialized = false;

    async function getMermaid() {
      if (window.mermaid) return window.mermaid;
      if (!mermaidLoadPromise) {
        mermaidLoadPromise = (async () => {
          const candidates = [
            './libs/mermaid.min.js',
            'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js'
          ];
          let lastErr = null;
          for (const src of candidates) {
            try {
              await loadScript(src);
              if (window.mermaid) return window.mermaid;
            } catch (err) {
              lastErr = err;
            }
          }
          throw (lastErr || new Error('Mermaid runtime unavailable'));
        })();
      }
      return mermaidLoadPromise;
    }

    async function ensureMermaidReady() {
      const mermaid = await getMermaid();
      if (!mermaidInitialized) {
        mermaid.initialize({ startOnLoad: false, securityLevel: 'loose' });
        mermaidInitialized = true;
      }
      return mermaid;
    }

    function buildMermaidPlaceholder(source) {
      return `<div class="mermaid-block" data-mermaid="${encodeURIComponent(source)}"></div>`;
    }

    function showMermaidSource(el, source, reason) {
      el.className = 'mermaid-fallback';
      el.innerHTML = `
        <div style="font-size:13px;color:#7a1f1f;margin:0 0 8px;">${escapeHtml(reason)}</div>
        <pre><code>${escapeHtml(source)}</code></pre>
      `;
    }

    async function renderMermaidBlocks(rootEl) {
      const blocks = Array.from(rootEl.querySelectorAll('.mermaid-block[data-mermaid]'));
      if (!blocks.length) return { total: 0, rendered: 0, failed: 0 };

      let mermaid;
      try {
        mermaid = await ensureMermaidReady();
      } catch (err) {
        for (const block of blocks) {
          const source = decodeURIComponent(block.dataset.mermaid || '');
          showMermaidSource(block, source, 'Mermaid runtime could not be loaded.');
        }
        return { total: blocks.length, rendered: 0, failed: blocks.length };
      }

      let rendered = 0;
      let failed = 0;
      for (const block of blocks) {
        const source = decodeURIComponent(block.dataset.mermaid || '');
        const diagram = document.createElement('div');
        diagram.className = 'mermaid';
        diagram.textContent = source;
        block.replaceWith(diagram);

        try {
          await mermaid.run({ nodes: [diagram] });
          rendered += 1;
        } catch (err) {
          failed += 1;
          console.error('Mermaid render failed:', err);
          const fallback = document.createElement('div');
          showMermaidSource(fallback, source, 'Mermaid render failed for this diagram.');
          diagram.replaceWith(fallback);
        }
      }

      return { total: blocks.length, rendered, failed };
    }

    function renderMarkdown(text, currentFilePath) {
      const m = window.marked;
      if (!m) return null;
      try {
        // Custom renderer: rewrite local markdown/mermaid links to open through view-md.html
        const baseRenderer = new m.Renderer();
        const renderer = new m.Renderer();
        renderer.link = function(...args) {
          let href = '';
          let title = null;
          let labelHtml = '';

          // Marked v4+ passes a token object. Older versions pass positional args.
          if (args[0] && typeof args[0] === 'object' && !Array.isArray(args[0])) {
            const token = args[0];
            href = token.href || '';
            title = token.title || null;
            if (token.tokens) {
              if (m.Parser && typeof m.Parser.parseInline === 'function') {
                labelHtml = m.Parser.parseInline(token.tokens, renderer);
              } else if (typeof m.parseInline === 'function') {
                labelHtml = m.parseInline(token.text || '');
              }
            }
            if (!labelHtml) {
              labelHtml = token.text || title || href;
            }
          } else {
            href = args[0] || '';
            title = args[1] || null;
            labelHtml = args[2] || title || href;
          }

          const isViewerLink = /^view-md\.html(?:[?#]|$)/i.test(href || '');
          if (!isViewerLink && href && /\.(md|markdown|mmd|mermaid)(#.*)?$/i.test(href) && !/^https?:\/\//i.test(href)) {
            const anchor  = href.includes('#') ? href.slice(href.indexOf('#')) : '';
            const mdHref  = href.includes('#') ? href.slice(0, href.indexOf('#')) : href;
            const resolved = resolveRelative(mdHref, currentFilePath);
            const dest = `view-md.html?path=${encodeURIComponent(resolved)}${anchor}`;
            const titleAttr = title ? ` title="${title}"` : '';
            return `<a href="${dest}"${titleAttr}>${labelHtml}</a>`;
          }
          const titleAttr = title ? ` title="${title}"` : '';
          const ext = href && (href.startsWith('http') || href.startsWith('//')) ? ' target="_blank" rel="noopener"' : '';
          return `<a href="${href}"${titleAttr}${ext}>${labelHtml}</a>`;
        };

        renderer.code = function(...args) {
          let token = null;
          let source = '';
          let lang = '';

          if (args[0] && typeof args[0] === 'object' && !Array.isArray(args[0])) {
            token = args[0];
            source = token.text || '';
            lang = String(token.lang || '').trim().toLowerCase();
          } else {
            source = args[0] || '';
            lang = String(args[1] || '').trim().toLowerCase();
          }

          if (lang === 'mermaid') {
            return buildMermaidPlaceholder(source);
          }

          if (token) {
            return baseRenderer.code.call(this, token);
          }

          return baseRenderer.code.call(this, source, args[1], args[2]);
        };

        if (typeof m.parse === 'function') return m.parse(text, { renderer });
        if (typeof m === 'function') return m(text, { renderer });
      } catch (e) {
        console.error('Markdown render failed:', e);
      }
      return null;
    }

    function getPathParam() {
      // Accept ?path=... or ?=... or bare hash #...
      const params = new URLSearchParams(window.location.search);
      if (params.has('path')) return params.get('path');
      // Fallback: first positional value (e.g. ?../foo/bar.md)
      const raw = window.location.search.slice(1);
      if (raw && !raw.includes('=')) return decodeURIComponent(raw);
      // Fallback: hash
      const hash = window.location.hash.slice(1);
      if (hash) return decodeURIComponent(hash);
      return null;
    }

    // Inject a stylesheet for the current markdown file.
    // Priority: explicit ?css= param > nearest viewer.css walking up from the md file's
    // directory to the origin root (first found wins, like .editorconfig / .gitignore).
    async function applyMdCss(mdPath) {
      // Remove any previously injected md stylesheet
      const prev = document.getElementById('md-css');
      if (prev) prev.remove();

      // Explicit ?css= takes priority — inject and return immediately
      const params = new URLSearchParams(window.location.search);
      const explicit = params.get('css');
      if (explicit) {
        const link = document.createElement('link');
        link.rel = 'stylesheet'; link.id = 'md-css'; link.href = explicit;
        document.head.appendChild(link);
        return;
      }

      // Build list of candidate viewer.css URLs from md dir up to origin root
      try {
        const pageBase = window.location.href.split('?')[0].replace(/[^/]+$/, '');
        const mdUrl = new URL(mdPath, pageBase);
        const origin = mdUrl.origin;

        // Collect directory segments from origin root to md file's dir
        const mdDir = mdUrl.href.replace(/[^/]+$/, '');
        const rel = mdDir.startsWith(origin) ? mdDir.slice(origin.length) : null;
        if (!rel) return;

        const parts = rel.replace(/\/$/, '').split('/').filter(Boolean);
        // Candidates: md dir first, then each parent up to origin root
        const candidates = [];
        for (let i = parts.length; i >= 0; i--) {
          candidates.push(origin + (parts.slice(0, i).join('/') ? '/' + parts.slice(0, i).join('/') + '/' : '/') + 'viewer.css');
        }

        // Walk candidates, use the first that returns 200
        for (const url of candidates) {
          try {
            const res = await fetch(url, { method: 'HEAD' });
            if (res.ok) {
              const link = document.createElement('link');
              link.rel = 'stylesheet'; link.id = 'md-css'; link.href = url;
              document.head.appendChild(link);
              return;
            }
          } catch (e) { /* network error — try next */ }
        }
      } catch (e) { /* ignore */ }
    }

    async function loadFile(path) {
      filePath.textContent = path;
      document.title = path.split('/').pop() + ' — Markdown Viewer';

      applyMdCss(path);

      const res = await fetch(path);
      if (!res.ok) throw new Error(`HTTP ${res.status} — ${path}`);
      const text = await res.text();

      if (isStandaloneMermaid(path)) {
        content.innerHTML = buildMermaidPlaceholder(text);
        const result = await renderMermaidBlocks(content);
        status.textContent = result.failed ? `mermaid rendered (${result.rendered}/${result.total})` : 'mermaid rendered';
        return;
      }

      const html = renderMarkdown(text, path);
      if (html !== null) {
        content.innerHTML = html;
        const mermaidResult = await renderMermaidBlocks(content);
        if (mermaidResult.total > 0) {
          status.textContent = mermaidResult.failed
            ? `rendered + mermaid (${mermaidResult.rendered}/${mermaidResult.total})`
            : `rendered + mermaid (${mermaidResult.total})`;
        } else {
          status.textContent = 'rendered';
        }
      } else {
        content.textContent = text;
        status.textContent = 'plain text (marked unavailable)';
      }
    }

    const DEFAULT_FILE = './index.md';

    // Maintain nav position using history.state (survives back/forward) and
    // sessionStorage for the total stack length.
    (function initNavTracking() {
      if (history.state && typeof history.state.mdNavPos === 'number') {
        // Restored via back/forward — position is already in history.state
        sessionStorage.setItem('mdNavPos', history.state.mdNavPos);
      } else {
        // Fresh navigation — advance the position counter
        const prev = parseInt(sessionStorage.getItem('mdNavPos') || '-1', 10);
        const newPos = prev + 1;
        sessionStorage.setItem('mdNavPos', newPos);
        sessionStorage.setItem('mdNavLen', newPos + 1);
        history.replaceState({ mdNavPos: newPos }, '');
      }
      updateNavButtons();
    })();

    (async () => {
      const path = getPathParam() || DEFAULT_FILE;

      try {
        await loadFile(path);
      } catch (err) {
        if (path === DEFAULT_FILE) {
          // Default index not found — show usage hint
          filePath.textContent = 'No file specified';
          status.textContent = '';
          content.innerHTML = `
            <h2>Markdown Viewer</h2>
            <p>Provide a file path via the <code>path</code> query parameter:</p>
            <pre>view-md.html?path=../project-data/projects/my-project.md</pre>
            <p class="muted">Or place an <code>index.md</code> next to this file for a default landing page.</p>
          `;
        } else {
          status.textContent = 'error';
          errorBox.style.display = 'block';
          errorDetail.innerHTML = `<code>${String(err)}</code>`;
          content.innerHTML = '';
        }
      }
    })();
  </script>
</body>
</html>
